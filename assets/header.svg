<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="8"/>

  <!-- Top border accent -->
  <rect width="800" height="2" fill="url(#textGrad)" rx="1"/>

  <!-- Prompt symbol -->
  <text x="48" y="108" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold"
        fill="#3fb950" filter="url(#glow)" opacity="0.6">$</text>

  <!-- Main title -->
  <text x="88" y="112" font-family="'Courier New', Courier, monospace" font-size="56" font-weight="bold"
        fill="url(#textGrad)" filter="url(#glow)" letter-spacing="2">opencode-spend</text>

  <!-- Blinking cursor -->
  <rect x="750" y="64" width="28" height="52" fill="#3fb950" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Tagline -->
  <text x="90" y="150" font-family="'Courier New', Courier, monospace" font-size="15"
        fill="#8b949e" letter-spacing="1">track total session spend across all subagents</text>

  <!-- Bottom border accent -->
  <rect y="198" width="800" height="2" fill="url(#textGrad)" rx="1"/>
</svg>
